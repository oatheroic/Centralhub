name: centralhub

networks:
  centralhub:
    driver: bridge

services:
  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    depends_on:
      - inference-gateway
      - app-template
      - app-central-hub
      - app-marketing
      - app-finance
    networks:
      - centralhub

  inference-gateway:
    build:
      context: ..
      dockerfile: services/inference-gateway/Dockerfile
    environment:
      PORT: 4000
      INFERENCE_PROVIDER: ${INFERENCE_PROVIDER:-claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-5}
      LOCAL_MODEL_BASE_URL: ${LOCAL_MODEL_BASE_URL:-}
      LOCAL_MODEL_NAME: ${LOCAL_MODEL_NAME:-}
    networks:
      - centralhub

  # --- App: _template -------------------------------------------------------
  # To add a new app: copy this service block, point `dockerfile` at the new
  # app's Dockerfile, give it a unique service name (app-<name>, matching the
  # gateway's dynamic /apps/<name>/ routing), and add it to gateway's
  # depends_on above. No Nginx changes needed.
  app-template:
    build:
      context: ..
      dockerfile: apps/_template/Dockerfile
    networks:
      - centralhub

  # --- App: central-hub -------------------------------------------------
  # Served at the gateway root (/), not /apps/central-hub/ — see
  # apps/central-hub/vite.config.ts for why.
  app-central-hub:
    build:
      context: ..
      dockerfile: apps/central-hub/Dockerfile
    networks:
      - centralhub

  # --- App: marketing -----------------------------------------------------
  app-marketing:
    build:
      context: ..
      dockerfile: apps/marketing/Dockerfile
    networks:
      - centralhub

  # --- App: finance -------------------------------------------------------
  app-finance:
    build:
      context: ..
      dockerfile: apps/finance/Dockerfile
    networks:
      - centralhub
