name: centralhub

networks:
  centralhub:
    driver: bridge

volumes:
  pgdata: {}
  assets_pgdata: {}
  assets_storage: {}
  engineering_pgdata: {}
  engineering_storage: {}

services:
  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    depends_on:
      - inference-gateway
      - auth-gateway
      - app-template
      - app-central-hub
      - app-marketing
      - app-finance
      - app-admin
      - app-assets
      - app-engineering
    networks:
      - centralhub

  # --- Postgres: backs Keycloak's own storage. A future fine-grained
  # permissions-service phase can add tables to this same instance without
  # introducing a new DB engine. ------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - centralhub

  # --- Keycloak: identity provider. NOT proxied through the main gateway —
  # it publishes its own host port so the browser can reach its hosted login
  # page directly; reverse-proxying Keycloak under an Nginx path prefix is a
  # well-known operational pain point. Boots with --import-realm against the
  # mounted realm-export.json, so `docker compose up` needs zero manual
  # console setup (realm, roles, client, seed users all pre-provisioned).
  # KC_HOSTNAME/_PORT/_STRICT pin a single issuer regardless of whether a
  # request arrives via localhost:${KEYCLOAK_PORT} (browser) or the internal
  # Docker DNS name keycloak:8080 (auth-gateway) — without this, token
  # issuer verification would break depending on which path served a given
  # request. See README "Pillar 4" for the full explanation.
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: ${KEYCLOAK_PORT:-8081}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ../keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ../keycloak/themes/centralhub:/opt/keycloak/themes/centralhub:ro
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    depends_on:
      - db
    networks:
      - centralhub

  inference-gateway:
    build:
      context: ..
      dockerfile: services/inference-gateway/Dockerfile
    environment:
      PORT: 4000
      INFERENCE_PROVIDER: ${INFERENCE_PROVIDER:-claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-5}
      LOCAL_MODEL_BASE_URL: ${LOCAL_MODEL_BASE_URL:-}
      LOCAL_MODEL_NAME: ${LOCAL_MODEL_NAME:-}
    networks:
      - centralhub

  # --- Auth gateway: OIDC relying party for Keycloak, and the target of
  # Nginx's auth_request sub-requests (see gateway/conf.d/default.conf).
  auth-gateway:
    build:
      context: ..
      dockerfile: services/auth-gateway/Dockerfile
    environment:
      PORT: 4100
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: http://localhost:${KEYCLOAK_PORT:-8081}
      GATEWAY_PUBLIC_URL: http://localhost:${GATEWAY_PORT:-8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-centralhub}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-auth-gateway}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET}
      # Reuses the db service/credentials that already back Keycloak — see
      # README "Pillar 4" for why this doesn't warrant a separate database.
      DATABASE_URL: postgres://keycloak:${POSTGRES_PASSWORD}@db:5432/keycloak
      # Shared with postgrest-assets/storage-assets — lets /auth/data-token
      # mint JWTs those services trust, sourced from the same app_permissions
      # rows every other app already uses. See README's third-party app
      # ingestion section.
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
    depends_on:
      - keycloak
      - db
    networks:
      - centralhub

  # --- Assets app's own database: a sibling to `db`, not a schema inside it —
  # every third-party app gets its own dedicated Postgres, per the per-app-
  # owns-its-data principle. Never shares credentials with `db` (Keycloak).
  assets-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assets
      POSTGRES_USER: assets
      POSTGRES_PASSWORD: ${ASSETS_DB_PASSWORD}
    volumes:
      - assets_pgdata:/var/lib/postgresql/data
      - ../apps/assets/scripts/init-roles.sql:/docker-entrypoint-initdb.d/00-roles.sql:ro
    networks:
      - centralhub

  # --- PostgREST: auto-generated REST API in front of assets-db, replacing
  # the hosted Supabase project the app was exported with. Verifies the
  # bearer JWT itself (PGRST_JWT_SECRET, shared with auth-gateway's
  # /auth/data-token minter) and exposes its claims to Postgres as
  # request.jwt.claims, which the RLS policies
  # (apps/assets/db/migrations/20260707000001_rls.sql) check for real
  # read/write/edit/delete grants — replacing the exported USING (true)
  # policies, which enforced nothing.
  postgrest-assets:
    image: postgrest/postgrest:v12.2.3
    environment:
      PGRST_DB_URI: postgres://assets:${ASSETS_DB_PASSWORD}@assets-db:5432/assets
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: assets_anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
      PGRST_JWT_ROLE_CLAIM_KEY: .role
    depends_on:
      - assets-db
    networks:
      - centralhub

  # --- Storage API: self-hosted replacement for Supabase Storage, backing
  # the app's "asset-images" bucket. File-system backend (a Docker volume),
  # not S3 — this is an internal tool's image/PDF attachments, not a CDN
  # workload. Keeps supabase.storage.from(...) client calls in the app
  # working unmodified; only client.ts's URL/key config changes.
  storage-assets:
    image: supabase/storage-api:v1.11.13
    environment:
      ANON_KEY: ${ASSETS_STORAGE_ANON_KEY}
      SERVICE_KEY: ${ASSETS_STORAGE_SERVICE_KEY}
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
      DATABASE_URL: postgres://assets:${ASSETS_DB_PASSWORD}@assets-db:5432/assets
      DB_INSTALL_ROLES: "false"
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: assets
      REGION: local
      GLOBAL_S3_BUCKET: unused
      FILE_SIZE_LIMIT: "52428800"
      ENABLE_IMAGE_TRANSFORMATION: "false"
    volumes:
      - assets_storage:/var/lib/storage
    depends_on:
      - assets-db
    networks:
      - centralhub

  # --- App: _template -------------------------------------------------------
  # To add a new app: copy this service block, point `dockerfile` at the new
  # app's Dockerfile, give it a unique service name (app-<name>, matching the
  # gateway's dynamic /apps/<name>/ routing), and add it to gateway's
  # depends_on above. No Nginx changes needed.
  app-template:
    build:
      context: ..
      dockerfile: apps/_template/Dockerfile
    networks:
      - centralhub

  # --- App: central-hub -------------------------------------------------
  # Served at the gateway root (/), not /apps/central-hub/ — see
  # apps/central-hub/vite.config.ts for why.
  app-central-hub:
    build:
      context: ..
      dockerfile: apps/central-hub/Dockerfile
    networks:
      - centralhub

  # --- App: marketing -----------------------------------------------------
  app-marketing:
    build:
      context: ..
      dockerfile: apps/marketing/Dockerfile
    networks:
      - centralhub

  # --- App: finance -------------------------------------------------------
  app-finance:
    build:
      context: ..
      dockerfile: apps/finance/Dockerfile
    networks:
      - centralhub

  # --- One-shot migrator for assets-db: applies the idempotent
  # schema/RLS migration files (apps/assets/db/migrations/), then, after
  # waiting for storage-assets to finish its own schema bootstrap (the
  # `storage` schema doesn't exist until then), applies the storage
  # bucket/policies migration. Retries internally rather than using compose
  # health-check conditions, matching every other service's
  # dependency-readiness pattern in this file (see auth-gateway's db.ts,
  # Keycloak's own boot).
  assets-migrate:
    build:
      context: ..
      dockerfile: apps/assets/scripts/Dockerfile
    environment:
      PGHOST: assets-db
      PGUSER: assets
      PGPASSWORD: ${ASSETS_DB_PASSWORD}
      PGDATABASE: assets
      STORAGE_HEALTH_URL: http://storage-assets:5000/status
    depends_on:
      - assets-db
      - storage-assets
    networks:
      - centralhub

  # --- App: assets (first third-party/Lovable-exported app) -----------------
  # Talks to postgrest-assets/storage-assets, not the gateway's app_permissions
  # flow directly — gated by the same generic /apps/assets/ Nginx block as
  # every app, plus a dedicated /apps/assets/api/ location for its data calls.
  app-assets:
    build:
      context: ..
      dockerfile: apps/assets/Dockerfile
    depends_on:
      - postgrest-assets
      - storage-assets
    networks:
      - centralhub

  # --- Engineering app's own database: a sibling to `db`/`assets-db`, not a
  # schema inside either — every third-party app gets its own dedicated
  # Postgres. Never shares credentials with `db` (Keycloak) or `assets-db`.
  engineering-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: engineering
      POSTGRES_USER: engineering
      POSTGRES_PASSWORD: ${ENGINEERING_DB_PASSWORD}
    volumes:
      - engineering_pgdata:/var/lib/postgresql/data
      - ../apps/engineering/scripts/init-roles.sql:/docker-entrypoint-initdb.d/00-roles.sql:ro
    networks:
      - centralhub

  # --- PostgREST: auto-generated REST API in front of engineering-db,
  # replacing the hosted Supabase project this export was built against.
  # Verifies the bearer JWT itself (PGRST_JWT_SECRET, shared with
  # auth-gateway's /auth/data-token minter) and exposes its claims to
  # Postgres as request.jwt.claims, which the RLS policies
  # (apps/engineering/db/migrations/20260716000001_rls.sql) check for
  # real role/department-scoped access — replacing this export's own real
  # (but Supabase-Auth-backed) RLS with the same logic, now resolved
  # against CentralHub identity instead.
  postgrest-engineering:
    image: postgrest/postgrest:v12.2.3
    environment:
      PGRST_DB_URI: postgres://engineering:${ENGINEERING_DB_PASSWORD}@engineering-db:5432/engineering
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: engineering_anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
      PGRST_JWT_ROLE_CLAIM_KEY: .role
    depends_on:
      - engineering-db
    networks:
      - centralhub

  # --- Storage API: self-hosted replacement for Supabase Storage, backing
  # the app's "repair-images" bucket. File-system backend (a Docker
  # volume), not S3. Keeps supabase.storage.from(...) client calls in the
  # app working unmodified; only client.ts's URL/key config changes.
  storage-engineering:
    image: supabase/storage-api:v1.11.13
    environment:
      ANON_KEY: ${ENGINEERING_STORAGE_ANON_KEY}
      SERVICE_KEY: ${ENGINEERING_STORAGE_SERVICE_KEY}
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
      DATABASE_URL: postgres://engineering:${ENGINEERING_DB_PASSWORD}@engineering-db:5432/engineering
      DB_INSTALL_ROLES: "false"
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: engineering
      REGION: local
      GLOBAL_S3_BUCKET: unused
      FILE_SIZE_LIMIT: "52428800"
      ENABLE_IMAGE_TRANSFORMATION: "false"
    volumes:
      - engineering_storage:/var/lib/storage
    depends_on:
      - engineering-db
    networks:
      - centralhub

  # --- One-shot migrator for engineering-db: applies the idempotent
  # schema/RLS migration files (apps/engineering/db/migrations/), then, after
  # waiting for storage-engineering to finish its own schema bootstrap (the
  # `storage` schema doesn't exist until then), applies the storage
  # bucket/policies migration. Mirrors assets-migrate exactly.
  engineering-migrate:
    build:
      context: ..
      dockerfile: apps/engineering/scripts/Dockerfile
    environment:
      PGHOST: engineering-db
      PGUSER: engineering
      PGPASSWORD: ${ENGINEERING_DB_PASSWORD}
      PGDATABASE: engineering
      STORAGE_HEALTH_URL: http://storage-engineering:5000/status
    depends_on:
      - engineering-db
      - storage-engineering
    networks:
      - centralhub

  # --- App: engineering (second third-party/Lovable-exported app) -----------
  # Talks to postgrest-engineering/storage-engineering, not the gateway's
  # app_permissions flow directly — gated by the same generic
  # /apps/engineering/ Nginx block as every app, plus a dedicated
  # /apps/engineering/api/ location for its data calls.
  app-engineering:
    build:
      context: ..
      dockerfile: apps/engineering/Dockerfile
    depends_on:
      - postgrest-engineering
      - storage-engineering
    networks:
      - centralhub

  # --- App: admin -----------------------------------------------------------
  # Deliberately excluded from apps/central-hub/src/registry/apps.ts — never
  # linked in the UI. Protection is the Nginx admin-role auth_request gate on
  # ^/apps/admin/(.*)$, not obscurity; a discovered URL still 401/403s
  # without valid admin credentials.
  app-admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
    networks:
      - centralhub
