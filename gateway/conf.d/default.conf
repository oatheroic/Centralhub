server {
    listen 80;
    server_name localhost;

    # Resolve upstream service names at request time via Docker's embedded
    # DNS (127.0.0.11), not once at nginx startup. Combined with the `set`
    # + variable proxy_pass below, this stops the gateway from refusing to
    # start (or getting stuck) if an app/service container isn't up yet or
    # gets recreated with a new IP.
    resolver 127.0.0.11 valid=10s;

    # Landing page — lists mounted apps until a real dashboard exists.
    location = / {
        default_type text/plain;
        return 200 "CentralHub gateway is up.\nApps:\n  /apps/_template/\nAPI:\n  /api/inference/\n";
    }

    # Inference gateway — every app talks to the LLM through this path only,
    # never to a provider SDK directly. Swapping providers is an env change
    # in services/inference-gateway, not a routing change here.
    location /api/inference/ {
        set $inference_upstream inference-gateway:4000;
        rewrite            ^/api/inference/(.*)$ /$1 break;
        proxy_pass         http://$inference_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- App: _template ---------------------------------------------------
    # To add a new app, copy this block and swap the path + upstream name.
    location /apps/_template/ {
        set $template_upstream app-template:80;
        rewrite            ^/apps/_template/(.*)$ /$1 break;
        proxy_pass         http://$template_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
