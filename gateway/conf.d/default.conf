server {
    listen 80;
    server_name localhost;

    # Resolve upstream service names at request time via Docker's embedded
    # DNS (127.0.0.11), not once at nginx startup. Combined with the `set`
    # + variable proxy_pass below, this stops the gateway from refusing to
    # start (or getting stuck) if an app/service container isn't up yet or
    # gets recreated with a new IP.
    resolver 127.0.0.11 valid=10s;

    # Internal-only: auth-gateway session checks, used via auth_request.
    # X-App-Id carries the per-app id (set via `set $app_id $1;` by the
    # calling location below) so auth-gateway can additionally check that
    # app's read permission for the current user; empty for the central-hub
    # root, which never sets $app_id, and for the /internal/verify
    # subrequest itself. NOTE: deliberately NOT declared/reset at server
    # scope here — a `set` at server level re-runs for every request
    # INCLUDING this subrequest (auth_request subrequests re-enter the full
    # phase engine, including the server rewrite phase, for their own URI),
    # which was found to clobber the calling location's value back to ''
    # before this proxy_set_header could read it. `set $app_id $1;` in the
    # generic apps location below is sufficient to declare the variable.
    location = /internal/verify {
        internal;
        set $verify_upstream auth-gateway:4100;
        proxy_pass          http://$verify_upstream/session/verify;
        proxy_pass_request_body off;
        proxy_set_header     Content-Length "";
        proxy_set_header     Cookie $http_cookie;
        proxy_set_header     X-App-Id $app_id;
    }

    location = /internal/verify-admin {
        internal;
        set $verify_upstream auth-gateway:4100;
        proxy_pass          http://$verify_upstream/session/verify-admin;
        proxy_pass_request_body off;
        proxy_set_header     Content-Length "";
        proxy_set_header     Cookie $http_cookie;
    }

    # Named target for unauthenticated (401) requests.
    # $http_host (not $host) is required here: nginx's `return 3xx` with a
    # relative URI auto-builds an absolute Location using $scheme://$host,
    # and $host strips the port. Since the gateway's external published port
    # (GATEWAY_PORT, e.g. 8080) differs from the port nginx listens on
    # inside the container (80), that produced Location: http://localhost/...
    # — a URL nothing is listening on, breaking every login redirect.
    # $http_host is the literal Host header the browser sent, port included.
    location @login_redirect {
        internal;
        return 302 $scheme://$http_host/auth/login?redirect=$request_uri;
    }

    # Named target for 403s (valid session, but insufficient permission —
    # either missing the "admin" role or missing this app's read grant).
    # Renders a friendly page server-side rather than a raw 403, then
    # redirects home — mirrors the logout confirmation page's UX.
    location @permission_denied {
        internal;
        set $denied_upstream auth-gateway:4100;
        proxy_pass          http://$denied_upstream/denied;
        proxy_set_header     Host $host;
    }

    # Named target for 502/504s from proxy_pass to an app-<id> upstream —
    # most commonly an app registered in auth-gateway's apps table (§12b's
    # dynamic registry) with no matching compose service/container running
    # yet. Renders a friendly page instead of a raw Nginx error, same
    # pattern as @permission_denied above (and same caveat: no explicit
    # status code, so this comes back as whatever /unavailable itself
    # returns — 200 — not the original 502/504).
    location @app_unavailable {
        internal;
        set $unavailable_upstream auth-gateway:4100;
        proxy_pass          http://$unavailable_upstream/unavailable;
        proxy_set_header     Host $host;
    }

    # Auth gateway — public login/callback/logout/me endpoints. Must NOT be
    # behind auth_request, or nobody could ever reach /auth/login to
    # authenticate in the first place.
    location /auth/ {
        set $auth_upstream auth-gateway:4100;
        rewrite            ^/auth/(.*)$ /$1 break;
        proxy_pass         http://$auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Cookie $http_cookie;
    }

    # Central Hub — gateway root. base:"/" means its asset URLs are
    # unprefixed, so no rewrite/prefix-stripping is needed here (unlike the
    # /apps/<name>/ regex block below).
    #
    # Cache-Control: no-store on every gated app response is required, not
    # optional: without it, a browser can restore a fully-rendered page from
    # its back/forward cache (bfcache) or disk cache on navigation WITHOUT
    # any network request at all — meaning auth_request never re-fires. That
    # produced exactly this symptom during testing: after logout, navigating
    # back to "/" showed the still-interactive, previously-authenticated
    # page with no login redirect, because the browser never actually asked
    # the server again. no-store is what Chrome/Firefox/Safari specifically
    # check to exclude a page from bfcache eligibility.
    location / {
        auth_request     /internal/verify;
        error_page 401 = @login_redirect;
        add_header         Cache-Control "no-store" always;
        set $hub_upstream app-central-hub:80;
        proxy_pass         http://$hub_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Inference gateway — every app talks to the LLM through this path only,
    # never to a provider SDK directly. Swapping providers is an env change
    # in services/inference-gateway, not a routing change here. Also gated:
    # this is a real-money Claude-backed endpoint that previously had zero
    # access control. No @login_redirect here (unlike the page-serving
    # blocks below) — this is an API surface called via fetch(), not browser
    # navigation, so a bare 401 is the correct shape for the caller to
    # handle, not an HTML login-page redirect.
    location /api/inference/ {
        auth_request     /internal/verify;
        set $inference_upstream inference-gateway:4000;
        rewrite            ^/api/inference/(.*)$ /$1 break;
        proxy_pass         http://$inference_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Normalize /apps/<name> (no trailing slash) -> /apps/<name>/ so the
    # dynamic block below (which needs the trailing slash to split the app
    # name from the sub-path) always matches. $http_host, not $host — see
    # the @login_redirect comment above for why (same port-stripping bug).
    location ~ ^/apps/([^/]+)$ {
        return 301 $scheme://$http_host/apps/$1/;
    }

    # Admin dashboard — requires the "admin" realm role, not just a valid
    # session. Not linked anywhere in central-hub's UI, but that's a minor
    # bonus, not the real protection: this gate is what actually stops
    # unauthorized access even if the URL is discovered.
    # MUST precede the generic ^/apps/([^/]+)/(.*)$ block below — Nginx
    # matches regex locations in file order and stops at the first match,
    # so the generic block would otherwise silently shadow this one.
    location ~ ^/apps/admin/(.*)$ {
        auth_request     /internal/verify-admin;
        error_page 401 = @login_redirect;
        error_page 403 = @permission_denied;
        # Without this, error_page 502/504 only catches errors Nginx itself
        # generates (like the auth_request-driven 403 above) — a real 502
        # body from proxy_pass passes straight through untouched otherwise.
        proxy_intercept_errors on;
        error_page 502 504 = @app_unavailable;
        add_header         Cache-Control "no-store" always;
        set $app_upstream app-admin:80;
        proxy_pass         http://$app_upstream/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Assets app's data API — proxies to postgrest-assets/storage-assets
    # (its self-hosted data layer), not app-assets (its static frontend).
    # `^~` disables regex matching for anything under these prefixes, so
    # they always win over the generic ^/apps/([^/]+)/(.*)$ block below
    # regardless of file order — without that, the generic block would
    # match first and proxy to app-assets:80/... instead. Two sub-paths, not
    # one: @supabase/supabase-js builds requests as `${url}/rest/v1/...` for
    # tables and `${url}/storage/v1/...` for files, but self-hosted
    # PostgREST/storage-api each serve directly at their own root — no
    # `/rest/v1`/`/storage/v1` prefix (that's a Kong convention, unused
    # here) — so each sub-path strips its own prefix before proxying.
    # Gated the same way every /apps/<name>/ block is (a valid session +
    # this app's read permission); the request itself still needs its own
    # bearer JWT from GET /auth/data-token for PostgREST/RLS to authorize
    # anything beyond "logged in".
    location ^~ /apps/assets/api/rest/v1/ {
        set $app_id "assets";
        auth_request     /internal/verify;
        error_page 401 = @login_redirect;
        error_page 403 = @permission_denied;
        add_header         Cache-Control "no-store" always;
        set $assets_rest_upstream postgrest-assets:3000;
        rewrite            ^/apps/assets/api/rest/v1/(.*)$ /$1 break;
        proxy_pass         http://$assets_rest_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization $http_authorization;
    }

    location ^~ /apps/assets/api/storage/v1/ {
        set $app_id "assets";
        auth_request     /internal/verify;
        error_page 401 = @login_redirect;
        error_page 403 = @permission_denied;
        add_header         Cache-Control "no-store" always;
        set $assets_storage_upstream storage-assets:5000;
        rewrite            ^/apps/assets/api/storage/v1/(.*)$ /$1 break;
        proxy_pass         http://$assets_storage_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization $http_authorization;
    }

    # Engineering app's data API — same pattern as assets's two blocks above,
    # proxying to postgrest-engineering/storage-engineering (its self-hosted
    # data layer), not app-engineering (its static frontend). See the
    # assets blocks' comment for why `^~` and the two sub-paths are needed.
    location ^~ /apps/engineering/api/rest/v1/ {
        set $app_id "engineering";
        auth_request     /internal/verify;
        error_page 401 = @login_redirect;
        error_page 403 = @permission_denied;
        add_header         Cache-Control "no-store" always;
        set $engineering_rest_upstream postgrest-engineering:3000;
        rewrite            ^/apps/engineering/api/rest/v1/(.*)$ /$1 break;
        proxy_pass         http://$engineering_rest_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization $http_authorization;
    }

    location ^~ /apps/engineering/api/storage/v1/ {
        set $app_id "engineering";
        auth_request     /internal/verify;
        error_page 401 = @login_redirect;
        error_page 403 = @permission_denied;
        add_header         Cache-Control "no-store" always;
        set $engineering_storage_upstream storage-engineering:5000;
        rewrite            ^/apps/engineering/api/storage/v1/(.*)$ /$1 break;
        proxy_pass         http://$engineering_storage_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Authorization $http_authorization;
    }

    # Dynamic app routing: /apps/<name>/<rest> -> app-<name>:80/<rest>
    # Numbered captures ($1 = app name, $2 = remaining path) instead of
    # named captures, to avoid any PCRE/PCRE2 syntax ambiguity across Nginx
    # builds. This is what makes adding a new app under /apps/<name>/ a
    # zero-Nginx-edit operation — only a new compose service is needed.
    # A request for a name with no matching app-<name> container fails DNS
    # resolution and returns 502 — rendered as a friendly "app unavailable"
    # page (@app_unavailable) rather than a raw Nginx error, since this is
    # the expected steady-state right after registering an app (§12b)
    # whose container/compose service doesn't exist yet. Requires a valid
    # session — any authenticated user, not just admins.
    location ~ ^/apps/([^/]+)/(.*)$ {
        set $app_id $1;
        auth_request     /internal/verify;
        error_page 401 = @login_redirect;
        error_page 403 = @permission_denied;
        # See the /apps/admin/ block above for why this is required — a
        # real 502 from proxy_pass otherwise passes through untouched.
        proxy_intercept_errors on;
        error_page 502 504 = @app_unavailable;
        add_header         Cache-Control "no-store" always;
        set $app_upstream app-$1:80;
        proxy_pass         http://$app_upstream/$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
